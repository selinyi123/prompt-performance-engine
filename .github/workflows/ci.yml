name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit and behavior tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Validate release contract
        env:
          PYTHONPATH: src
        run: python scripts/validate_release.py

  package:
    name: Build and install wheel
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Test wheel installation
        run: |
          python -m venv wheel-smoke
          wheel-smoke/bin/python -m pip install --disable-pip-version-check --no-index dist/*.whl
          wheel-smoke/bin/python -c "from prompt_performance_engine.profiles import load_profiles; assert len(load_profiles()) == 13"
          wheel-smoke/bin/python -c "from prompt_performance_engine.compiler import compile_request; from prompt_performance_engine.contracts import OptimizationRequest; assert compile_request(OptimizationRequest(source_prompt='Write Python code.'))['runtime_request']['resolved_domain']['id'] == 'software_engineering'"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: prompt-performance-engine-dist
          path: dist/
          if-no-files-found: error

  docker-sandbox:
    name: Verify Docker sandbox
    runs-on: ubuntu-latest
    env:
      PPE_TEST_DOCKER_SANDBOX_IMAGE: python:3.13-alpine@sha256:db66119d6609a3a941a9433b225f4e13d33c459cede097cf3ec2fc4d1bd314b2

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Pull pinned sandbox image
        run: docker pull "$PPE_TEST_DOCKER_SANDBOX_IMAGE"

      - name: Run real Docker isolation tests
        env:
          PYTHONPATH: src
        run: python -m unittest tests.test_software_sandbox.DockerSandboxIntegrationTests -v
